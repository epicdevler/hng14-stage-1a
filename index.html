<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stage 1B | Advanced Todo Card (Interactive & Stateful)</title>
    <link rel="stylesheet" href="./assets/css/main.css">
    <link rel="stylesheet" href="./assets/css/edit-form.css">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Mono:wght@300;400&display=swap"
        rel="stylesheet" />
</head>

<body>
    <main>
        <articel class="task-item" data-testid="test-todo-card">
            <div class="task-header">
                <input type="checkbox" aria-label="Toggle complete" data-testid="test-todo-complete-toggle" />
                <h2 class="task-title" data-testid="test-todo-title">Title</h2>

                <div data-testid="test-todo-priority-indicator">
                    <p class="chip task-priority" data-testid="test-todo-priority">High</p>
                </div>

            </div>
            <div class="task-body">
                <div data-testid="test-todo-collapsible-section" class="collapseable">
                    <button role="button" tabindex="0" class="toggle-description" data-testid="test-todo-expand-toggle"></button>
                     <span class="task-description" data-testid="test-todo-description">
                        Create wireframes and high-fidelity mockups for the new marketing landing page, covering both
                        mobile and desktop breakpoints.
                    </span>
                </div>
                <div class="meta-grid">
                    <div>
                        <p class="meta-label">Due Date</p>
                        <div class="meta-content"><time class="due-date" datetime="2026-04-16"
                                data-testid="test-todo-due-date">Due Apr
                                16, 2026</time></div>
                    </div>
                    <div>
                        <p class="meta-label">Remaining</p>
                        <div class="meta-content">
                            <p aria-live="polite" data-testid="test-todo-time-remaining" class="time-remaining">3 Days
                            </p>
                        </div>
                    </div>
                    <div>
                        <p class="meta-label">Status</p>
                        <div class="meta-content">
                            <p class="task-status status hide">Pending</p>
                            <select name="update-status-select" class="task-status  status"
                                data-testid="test-todo-status-control" data-testid="test-todo-status">
                                <button>
                                    <selectedcontent></selectedcontent>
                                </button>
                                <option value="pending">Pending</option>
                                <option value="in-progress">In Progress</option>
                                <option value="done">Done</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="separator"></div>

                <ul role="list" class="tags" data-testid="test-todo-tags">
                    <li data-testid="test-todo-tag-work" class="chip">Work</li>
                    <li data-testid="test-todo-tag-urgent" class="chip">Urgent</li>
                </ul>
            </div>

            <div class="task-footer">
                <button class="task-edit-btn" data-testid="test-todo-edit-button">Edit</button>
                <button class="task-delete-btn" data-testid="test-todo-delete-button">Delete</button>
            </div>

        </articel>

        <form id="taskEditForm" class="task-item-edit hide" data-testid="test-todo-edit-form">
            <h2>Edit Task</h2>
            <div class="field">
                <label for="task_title">Tile</label>
                <input name="task_title" id="task_title" type="text" data-testid="test-todo-edit-title-input" />
                <p class="error-text hide">Required</p>

            </div>
            <div class="field">
                <label for="task_description">Description</label>
                <textarea name="task_description" id="task_description" rows="3"
                    data-testid="test-todo-edit-description-input"></textarea>
                <p class="error-text">Required</p>
            </div>
            <div class="field">
                <label for="task_priority">Priority</label>
                <select name="task_priority" id="task_priority" data-testid="test-todo-edit-priority-select">
                    <option value="">Select</option>
                    <option value="low">Low</option>
                    <option value="medium">Medium</option>
                    <option value="high">High</option>
                </select>
                <p class="error-text">Required</p>
            </div>

            <div class="field">
                <label for="due_date">Due Date</label>
                <input name="due_date" id="due_date" type="datetime-local"
                    data-testid="test-todo-edit-due-date-input" />
                <p class="error-text">Required</p>
            </div>


            <div class="form-actions">
                <button type="button" class="task-cancel-btn" data-testid="test-todo-cancel-button">Cancel</button>
                <button type="submit" class="task-save-btn" data-testid="test-todo-save-button">Save</button>
            </div>

        </form>
    </main>

    <script src="./assets/js/main.js" type="module"></script>
    <script src="./assets/js/form.js" type="module"></script>
</body>

</html>
